name: Java CI with Maven

on:
  push:
    branches:
      - "master"
      # - "guardian/**"
  # pull_request:
  #   branches:
  #     - "master"
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual trigger"
        required: false
        default: "Pipeline Guardian auto-fix"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build with Maven
        run: mvn -B clean compile --file pom.xml

      - name: Run tests
        run: mvn -B test --file pom.xml

      - name: Package
        run: mvn -B package -DskipTests --file pom.xml

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 7

  notify-failure:
    runs-on: ubuntu-latest
    needs: build
    if: failure()

    steps:
      - name: Log failure details for Pipeline Guardian
        run: |
          echo "========================================"
          echo "Build failed — Pipeline Guardian notified"
          echo "========================================"
          echo "Repository : ${{ github.repository }}"
          echo "Branch     : ${{ github.ref_name }}"
          echo "Commit SHA : ${{ github.sha }}"
          echo "Run ID     : ${{ github.run_id }}"
          echo "Run URL    : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "========================================"
          echo "Pipeline Guardian webhook fires automatically"
          echo "via GitHub repo webhook settings."
